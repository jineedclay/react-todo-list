<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Todo List</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Socket.io Client -->
    <script src="/socket.io/socket.io.js"></script>

    <style>
        :root {
            --primary: #8a2be2;
            --primary-light: #9d4edd;
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
        }

        .ambient-light {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--primary);
            filter: blur(120px);
            border-radius: 50%;
            opacity: 0.3;
            z-index: 0;
            animation: float 10s ease-in-out infinite alternate;
        }

        .ambient-light-2 {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #3b82f6;
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.2;
            right: 10%;
            bottom: 10%;
            z-index: 0;
            animation: float 8s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
            from { transform: translateY(20px); opacity: 0; }
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .input-group {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .todo-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .todo-input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.2);
        }

        .todo-input::placeholder {
            color: var(--text-muted);
        }

        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border: none;
            border-radius: 12px;
            width: 52px;
            height: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        .add-btn:active {
            transform: translateY(0);
        }

        .todo-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 0.5rem;
        }

        .todo-list::-webkit-scrollbar {
            width: 6px;
        }

        .todo-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .todo-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .todo-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            animation: fadeIn 0.4s ease forwards;
        }

        .todo-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }

        .todo-item.completed .todo-text {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex: 1;
            cursor: pointer;
        }

        .checkbox {
            width: 22px;
            height: 22px;
            border-radius: 6px;
            border: 2px solid var(--text-muted);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
            cursor: pointer;
            flex-shrink: 0;
        }

        .todo-item.completed .checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }

        .check-icon {
            color: white;
            font-size: 14px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .todo-item.completed .check-icon {
            opacity: 1;
            transform: scale(1);
        }

        .todo-text {
            font-size: 1rem;
            word-break: break-all;
            transition: all 0.3s ease;
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .empty-state {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        /* Stats */
        .stats {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const socket = io(); // Connect to local socket.io server

        const App = () => {
            // State
            const [todos, setTodos] = useState([]);
            const [inputValue, setInputValue] = useState('');

            // Socket.io 실시간 데이터 연동
            useEffect(() => {
                socket.on('initialData', (data) => {
                    setTodos(data);
                });

                socket.on('todosUpdated', (data) => {
                    setTodos(data);
                });

                // 컴포넌트 언마운트 시 리스너 해제
                return () => {
                    socket.off('initialData');
                    socket.off('todosUpdated');
                };
            }, []);

            // Handlers
            const handleAddTodo = (e) => {
                e.preventDefault();
                if (inputValue.trim() === '') return;
                
                const newTodo = {
                    id: Date.now(),
                    text: inputValue,
                    completed: false,
                    createdAt: Date.now()
                };
                
                socket.emit('addTodo', newTodo);
                setInputValue('');
            };

            const toggleTodo = (todo) => {
                socket.emit('toggleTodo', { id: todo.id, completed: !todo.completed });
            };

            const deleteTodo = (id) => {
                socket.emit('deleteTodo', id);
            };

            // Calculated Stats
            const completedCount = todos.filter(t => t.completed).length;
            const totalCount = todos.length;
            const progress = totalCount === 0 ? 0 : Math.round((completedCount / totalCount) * 100);

            // Icons
            const CheckIcon = () => (
                <svg className="check-icon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            );

            const TrashIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    <line x1="10" y1="11" x2="10" y2="17"></line>
                    <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
            );

            const PlusIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
            );

            const EmptyIcon = () => (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
            );

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>오늘의 할 일</h1>
                        <p>당신의 하루를 더 특별하게 만들어보세요.</p>
                    </div>

                    <form className="input-group" onSubmit={handleAddTodo}>
                        <input 
                            type="text" 
                            className="todo-input" 
                            placeholder="새로운 할 일을 입력하세요..." 
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                        />
                        <button type="submit" className="add-btn" aria-label="Add task">
                            <PlusIcon />
                        </button>
                    </form>

                    {todos.length > 0 ? (
                        <ul className="todo-list">
                            {todos.map(todo => (
                                <li key={todo.id} className={`todo-item ${todo.completed ? 'completed' : ''}`}>
                                    <div className="todo-content" onClick={() => toggleTodo(todo)}>
                                        <div className="checkbox">
                                            <CheckIcon />
                                        </div>
                                        <span className="todo-text">{todo.text}</span>
                                    </div>
                                    <button 
                                        className="delete-btn" 
                                        onClick={() => deleteTodo(todo.id)}
                                        aria-label="Delete task"
                                    >
                                        <TrashIcon />
                                    </button>
                                </li>
                            ))}
                        </ul>
                    ) : (
                        <div className="empty-state">
                            <EmptyIcon />
                            <p>모든 할 일을 마쳤습니다!</p>
                        </div>
                    )}

                    <div className="stats">
                        <span>전체: {totalCount}개</span>
                        <span>완료율: {progress}%</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
